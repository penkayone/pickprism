<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 440" width="1280" height="440" role="img" aria-label="PickPrism - Decision Engine">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#141822"/>
      <stop offset="0.55" stop-color="#10131a"/>
      <stop offset="1" stop-color="#0b0e14"/>
    </linearGradient>
    <linearGradient id="face" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffcea6"/>
      <stop offset="0.45" stop-color="#ff7a1a"/>
      <stop offset="1" stop-color="#e86a0c"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.6">
      <stop offset="0" stop-color="#ff7a1a" stop-opacity="0.30"/>
      <stop offset="0.6" stop-color="#ff7a1a" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#ff7a1a" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>

  <!-- surface -->
  <rect x="0" y="0" width="1280" height="440" rx="30" fill="url(#bg)"/>
  <rect x="1" y="1" width="1278" height="438" rx="29" fill="none" stroke="#252b38" stroke-width="1.5"/>

  <!-- ambient glow -->
  <ellipse cx="640" cy="205" rx="540" ry="190" fill="url(#glow)"/>

  <!-- floating comparison cards (depth motif) -->
  <g opacity="0.10" fill="none" stroke="#ff7a1a" stroke-width="2">
    <rect x="70"  y="250" width="150" height="96" rx="14" transform="rotate(-9 145 298)"/>
    <rect x="120" y="235" width="150" height="96" rx="14" transform="rotate(-9 195 283)"/>
    <rect x="1060" y="90" width="150" height="96" rx="14" transform="rotate(8 1135 138)"/>
    <rect x="1015" y="105" width="150" height="96" rx="14" transform="rotate(8 1090 153)"/>
  </g>

  <!-- kicker -->
  <text x="640" y="98" text-anchor="middle" fill="#8592a6"
        font-family="'Helvetica Neue',Arial,sans-serif" font-size="21" font-weight="700"
        letter-spacing="7">WORDPRESS  ·  AFFILIATE  ·  LIVE DATA</text>

  <!-- ground shadow under title -->
  <ellipse cx="650" cy="272" rx="360" ry="24" fill="#000000" opacity="0.40" filter="url(#soft)"/>

  <!-- 3D extruded title: extrusion stack (deepest first) -->
  <g font-family="'Arial Black','Helvetica Neue',Impact,sans-serif" font-weight="900"
     font-size="100" letter-spacing="4" text-anchor="middle">
    <text x="666.6" y="276.6" fill="#4c1c03">PICKPRISM</text>
    <text x="664.7" y="274.7" fill="#4c1c03">PICKPRISM</text>
    <text x="662.8" y="272.8" fill="#562004">PICKPRISM</text>
    <text x="660.9" y="270.9" fill="#562004">PICKPRISM</text>
    <text x="659.0" y="269.0" fill="#622606">PICKPRISM</text>
    <text x="657.1" y="267.1" fill="#622606">PICKPRISM</text>
    <text x="655.2" y="265.2" fill="#6f2b05">PICKPRISM</text>
    <text x="653.3" y="263.3" fill="#6f2b05">PICKPRISM</text>
    <text x="651.4" y="261.4" fill="#7c3006">PICKPRISM</text>
    <text x="649.5" y="259.5" fill="#883607">PICKPRISM</text>
    <text x="647.6" y="257.6" fill="#883607">PICKPRISM</text>
    <text x="645.7" y="255.7" fill="#973d09">PICKPRISM</text>
    <text x="643.8" y="253.8" fill="#973d09">PICKPRISM</text>
    <text x="641.9" y="251.9" fill="#a4430a">PICKPRISM</text>
    <!-- front face -->
    <text x="640" y="250" fill="url(#face)" stroke="#ffb877" stroke-width="0.7">PICKPRISM</text>
  </g>

  <!-- accent bar -->
  <rect x="560" y="286" width="160" height="6" rx="3" fill="#ff7a1a"/>

  <!-- subtitle -->
  <text x="640" y="338" text-anchor="middle" fill="#ff9a4d"
        font-family="'Helvetica Neue',Arial,sans-serif" font-size="34" font-weight="800"
        letter-spacing="2">Decision Engine</text>

  <!-- tagline -->
  <text x="640" y="382" text-anchor="middle" fill="#aeb6c4"
        font-family="'Helvetica Neue',Arial,sans-serif" font-size="21" font-weight="500">Авто-страницы сравнения сервисов на живых данных, а не пустые AI-статьи</text>
</svg>
